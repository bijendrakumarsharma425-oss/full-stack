<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initialscale=1.0">
    <title>Student Registration Form</title>
</head>   
<body>
    <h2 align="center"><u>Student Registration Form</u></h2>
    <form>
        <table align="center" bgcolor="red">
            <tr>
                <td>
                    <label>First Name</label><br><br>
                </td>
                <td>
                    <input type="text" name="txtname" value="" placeholder="Sulekha"/><label>(Max 50 Characters Allowed)</label><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Last NAme</label><br><br>
                </td>
                <td>
                    <input tupe="text" name="txtname" value="" placeholder="Kumari"/><label>(Max 50 Characters Allowed)</label><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Email ID</label><br><br>
                </td>
                <td>
                    <input type="email" name="txtemail" value="" placeholder="sulekhakumari098radhe@gmail.com"/><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Mobile Number</label><br><br>
                </td>
                <td>
                    <input type="number" name="nummobile" value="" placeholder="8294xxxxxx"/><label>(10 digit Allowed)</label><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Gender</label><br><br>
                </td>
                <td>
                    <input type="radio" name="gender" value="Male"/><label>Male</label>
                    <input type="radio" name="gender" value="Female"/><label>Female</label><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Date of Birth(DOB)</label><br><br>
                </td>
                <td>
                    <input type="date" name="txtdob" value=""/><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Address</label><br><br>
                </td>
                <td>
                    <textarea name="txtaddress" cols="50" rows="5"></textarea><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>City</label><br><br>
                </td>
                <td>
                    <input type="text" name="txtcity" value="" placeholder="Siwan"/><label>(Max 50 Character Allowed)</label><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Pin Code</label><br><br>
                </td>
                <td>
                    <input type="number" name="numpin" value="" placeholder="841241"/><label>(Max 6 Character Allowed)</label><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>State</label><br><br>
                </td>
                <td>
                    <input type="text" name="txtstate" value="" placeholder="Bihar"/><label>(Max 50 Character Allowed)</label><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Country</label><br><br>
                </td>
                <td>
                    <input type="text" name="txtcountry" value="" placeholder="India"/><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Hobbies</label><br><br>
                </td>
                <td>
                    <input type="checkbox" name="chk1" value="Drawing"/><label>Drawing</label><br>
                    <input type="checkbox" name="chk2" value="Singing"/><label>Singing</label><br>
                    <input type="checkbox" name="chk3" value="Dancing"/><label>Dancing</label><br>
                    <input type="checkbox" name="chk4" value="Sketching"/><label>Sketching</label><br>
                    <input type="checkbox" name="chk5" value="Others"/><label>Others</label><br><br>
                </td>
                <td>
                    <input type="text" name="txt1" value="" placeholder="Ex-Teaching"/><label>(Max 50 Character Allowed)</label><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Qualification</label><br><br>
                </td>
                <td>
                    <input type="checkbox" name="chk1" value=""/><label>High School (10th)</label><br>
                    <input type="checkbox" name="chk2" value=""/><label>Higher School</label> (12th)</label><br>
                    <input type="checkbox" name="chk3" value=""/><label>Graduation(Bachelors)</label><br>
                    <input type="checkbox" name="chk4" value=""/><label>Post Graducation(Masters)</label><br>
                    <input type="checkbox" name="chk5" value=""/><label>Phd</label><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Courses Applied For</label>
                </td>
                <td>
                    <input type="radio" name="courses" value=""/><label>BCA(Bachelor of Computer Applications)</label><br>
                    <input type="radio" name="courses" value=""/><label>B.Com(Bachelor of Commerce)</label><br>
                    <input type="radio" name="courses" value=""/><label>B.Sc(Bachelor of Science)</label><br>
                    <input type="radio" name="courses" value=""/><label>BA(Bachelor of Arts)</label><br>
                    <input type="radio" name="courses" value=""/><label>MCA(Master of CVomputer Application)</label><br>
                    <input type="radio" name="courses" value=""/><label>M.Com(Master of Commerce)</label><br>
                    <input type="radio" name="courses" value=""/><label>M.Sc(Master of Science)</label><br>
                    <input type="radio" name="courses" value=""/><label>MA(Master of Arts)</label><br><br>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="Submit" name="btn1" value="Submit"/><br><br>
                </td>
                <td>
                    <input type="Reset" name="btn2" value="Reset"/><br><br>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
