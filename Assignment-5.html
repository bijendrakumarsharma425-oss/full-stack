<!DOCTYPE html>
<html lang="en">
    <head>       
     <meta charset="UTF-8">
     <meta name="viewport"content="width=device-width,initialscale=1.0">
     <title>USER FORM</title>
    </head>
    <body align="center" bgcolor="lightgreen" >
        <fieldset>
            <legend><h2>User Form</h2></legend>
        <form align="center"  >
            <table  width="30%"bgcolor="green" align="center" >
                <tr>
                    <td>
                        <label>FIRST NAME</label>
                    </td>
                    <td>
                        <input type="text" name="txtname" value=""/><br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>PASSWORD</label>
                    </td>
                    <td>
                        <input type="password" name="txtpassword" value=""/><br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>GENDER</label>
                    </td>
                    <td>
                        <input type="radio" name="gender"value="Male"/><label>Male</label>
                        <input type="radio" name="gender"value="Female"/><label>Female</label><br><br>

                    </td>
                </tr>
                <tr>
                    <td>
                        <label>ADDRESS</label>
                    </td>
                    <td>
                        <textarea name="txtaddress" cols="30" rows="5"></textarea><br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>D.O.B</label>
                    </td>
                    <td>
                        <input type="date" name="txtdob" value=""/><br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>SELECT GAMES</label>
                    </td>
                    <td>
                        <input type="checkbox" name="chk1" value="Hockey"/><label>Hockey</label>
                        <input type="checkbox" name="chk2" value="Football"/><label>Football</label>
                        <input type="checkbox" name="chk3" value="Cricket"/><label>Cricket</label>
                        <input type="checkbox" name="chk4" value="VolleyBall"/><label>VolleyBall</label><br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label>MARITAL STATUS</label>
                    </td>
                    <td>
                    <input type="radio" name="txtmaritalstatus" value="Married"/><label>Married</label>
                    <input type="radio" name="txtmaritalstatus" value="Unmarried"/><label>Unmarried</label><br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="Submit" name="btn1" value="submit"/><br><br>
                    </td>
                    <td>
                        <input type="Reset" name="btn2" value="Reset"/><br><br>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="checkbox" name="chk1" value=""/><br><br>
                    </td>
                    <td>
                        <label>I accept this agrement</label><br><br>
                    </td>
                </tr>
            </table>

        </form>
    </body>
</fieldset>
</html>
